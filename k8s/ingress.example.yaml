apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: terraform-platform
  labels:
    app.kubernetes.io/name: terraform-platform
  annotations:
    # Public path requirements: /callbacks/init-shell/* for VM callbacks and /api/runtime/* for ADMIN_API_KEY-protected consumer output reads.
    # Exposing /api/runtime/* shares the admin-token blast radius with runtime output consumers.
    # Security-first default: keep admin UI/API paths (/, /login, /assets/*, /ui/*, /api/* except /api/runtime/*) private or internal-only.
    # Never expose filesystem paths such as /app/config, /app/data, /config, or /data.
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - terraform-platform.example.com
      secretName: terraform-platform-tls
  rules:
    - host: terraform-platform.example.com
      http:
        paths:
          - path: /callbacks/init-shell
            pathType: Prefix
            backend:
              service:
                name: terraform-platform
                port:
                  name: http
          - path: /api/runtime
            pathType: Prefix
            backend:
              service:
                name: terraform-platform
                port:
                  name: http

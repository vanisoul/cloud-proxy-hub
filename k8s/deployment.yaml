apiVersion: apps/v1
kind: Deployment
metadata:
  name: terraform-platform
  labels:
    app.kubernetes.io/name: terraform-platform
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: terraform-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: terraform-platform
    spec:
      containers:
        - name: terraform-platform
          image: ghcr.io/your-org/terraform-platform:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: terraform-platform-config
            - secretRef:
                name: terraform-platform-secret
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: data
              mountPath: /app/data
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 30
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: terraform-platform-config
        - name: data
          persistentVolumeClaim:
            claimName: terraform-platform-data

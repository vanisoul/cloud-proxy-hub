apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: terraform-platform
resources:
  - namespace.yaml
  - configmap.yaml
  - persistentvolumeclaims.yaml
  - deployment.yaml
  - service.yaml
  - ingress.example.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: terraform-platform
      app.kubernetes.io/part-of: cloud-proxy-hub
